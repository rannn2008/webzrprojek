<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">SpotFinder Premium Logo</title>
  <desc id="desc">Elegant smart parking logo for SpotFinder with a parking pin mark, neon blue-green accents, and the SpotFinder wordmark.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0C111B"/>
      <stop offset="0.52" stop-color="#080D18"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="aqua" x1="251" y1="171" x2="626" y2="637" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#00E5FF"/>
      <stop offset="0.5" stop-color="#007BFF"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="word" x1="689" y1="328" x2="1368" y2="459" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.56" stop-color="#D9F7FF"/>
      <stop offset="1" stop-color="#00E5FF"/>
    </linearGradient>
    <linearGradient id="line" x1="692" y1="510" x2="1148" y2="510" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset="1" stop-color="#10B981"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(417 416) rotate(54.9) scale(455 455)">
