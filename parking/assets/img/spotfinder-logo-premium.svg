      <stop offset="0.42" stop-color="#007BFF" stop-opacity="0.13"/>
      <stop offset="1" stop-color="#00E5FF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="117" y="73" width="631" height="687" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="0" stdDeviation="24" flood-color="#00E5FF" flood-opacity="0.42"/>
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
    <filter id="wordShadow" x="632" y="264" width="850" height="174" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
